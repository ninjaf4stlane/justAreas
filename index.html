<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Áreas Disponíveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff7f0;
      color: #333;
      font-family: Arial, sans-serif;
    }

    #loader {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      background: #ff7a00;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .wheel {
      width: 50px;
      height: 50px;
      border: 6px solid white;
      border-top: 6px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    header {
      background: linear-gradient(90deg, #ff7a00, #ff9a3c);
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    #lastUpdate {
      margin-top: 8px;
      font-size: 14px;
      font-weight: normal;
      opacity: 0.9;
      font-family: 'Poppins', Arial, sans-serif;
    }

    .header-controls {
      margin-top: 12px;
      font-size: 14px;
      font-weight: normal;
    }

    .controls-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #searchInput {
      width: 280px;
      max-width: 90%;
      padding: 10px 14px;
      border: none;
      outline: none;
      border-radius: 10px;
      font-family: 'Poppins', Arial, sans-serif;
      font-size: 14px;
      color: #333;
    }

    .header-controls label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-family: 'Poppins', Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      color: #ff7a00;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .status {
      font-size: 13px;
    }

    .open {
      color: green;
    }

    .closed {
      color: red;
    }

    .change-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 600;
      background: #fff1e6;
      color: #c95f00;
    }

    .message {
      padding: 30px;
      text-align: center;
      color: #777;
      font-size: 15px;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="wheel"></div>
    <p>Carregando...</p>
  </div>

  <header>
    Áreas Disponíveis para Registro
    <div id="lastUpdate"></div>
    <div class="header-controls">
      <div class="controls-stack">
        <input type="text" id="searchInput" placeholder="Pesquisar área...">
        <label>
          <input type="checkbox" id="onlyAvailable" checked>
          Mostrar apenas áreas disponíveis
        </label>
      </div>
    </div>
  </header>

  <div class="container" id="container"></div>

  <script>
    const FILE_URL = 'https://raw.githubusercontent.com/ninjaf4stlane/justAreas/refs/heads/main/cidades.txt';
    const OLD_FILE_URL = 'https://raw.githubusercontent.com/ninjaf4stlane/justAreas/refs/heads/main/cidades_old.txt';

    function createCard(city, status, changeType = '') {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.status = status;
      card.dataset.city = city.toLowerCase();

      const title = document.createElement('h3');
      title.textContent = city;

      const statusEl = document.createElement('p');
      statusEl.className = 'status ' + status;
      statusEl.textContent = status === 'open' ? 'Disponível' : 'Indisponível';

      card.appendChild(title);
      card.appendChild(statusEl);

      if (changeType) {
        const badge = document.createElement('span');
        badge.className = 'change-badge';
        badge.textContent = changeType === 'opened' ? 'Abriu agora' : 'Fechou agora';
        card.appendChild(badge);
      }

      return card;
    }

    function applyFilter() {
      const checkbox = document.getElementById('onlyAvailable');
      const searchInput = document.getElementById('searchInput');
      const cards = document.querySelectorAll('.card');
      const showOnlyAvailable = checkbox.checked;
      const search = searchInput.value.trim().toLowerCase();

      cards.forEach((card) => {
        const isAvailable = card.dataset.status === 'open';
        const cityName = card.dataset.city || '';
        const matchesAvailability = !showOnlyAvailable || isAvailable;
        const matchesSearch = cityName.includes(search);

        card.style.display = matchesAvailability && matchesSearch ? 'block' : 'none';
      });
    }

    function parseLinesFromText(text) {
      return text
        .split('\n')
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
    }

    function buildStatusMap(lines) {
      const map = {};

      lines.forEach((line) => {
        const parts = line.split('|');
        const city = (parts[0] || '').trim();
        const normalizedStatus = (parts[1] || 'open').trim().toLowerCase();
        const status = normalizedStatus === 'closed' ? 'closed' : 'open';

        if (city) {
          map[city] = status;
        }
      });

      return map;
    }

    function compareWithPrevious(previousMap, currentMap) {
      const changes = {};

      Object.keys(currentMap).forEach((city) => {
        const oldStatus = previousMap[city];
        const newStatus = currentMap[city];

        if (!oldStatus || oldStatus === newStatus) {
          return;
        }

        changes[city] = oldStatus === 'closed' && newStatus === 'open' ? 'opened' : 'closed';
      });

      return changes;
    }

    function normalizeCityLines(lines) {
      return lines.filter((line) => line.includes('|'));
    }

    async function loadCities() {
      const container = document.getElementById('container');
      const updateEl = document.getElementById('lastUpdate');

      try {
        const [currentResponse, oldResponse] = await Promise.all([
          fetch(FILE_URL, { cache: 'no-store' }),
          fetch(OLD_FILE_URL, { cache: 'no-store' })
        ]);

        if (!currentResponse.ok) {
          throw new Error('Não foi possível carregar o arquivo de cidades atual.');
        }

        if (!oldResponse.ok) {
          throw new Error('Não foi possível carregar o arquivo de cidades antigo.');
        }

        const currentText = await currentResponse.text();
        const oldText = await oldResponse.text();

        const currentLines = parseLinesFromText(currentText);
        const oldLines = parseLinesFromText(oldText);

        const updateDate = currentLines.shift() || '';
        oldLines.shift();

        if (updateEl) {
          updateEl.textContent = updateDate ? 'Última atualização: ' + updateDate : '';
        }

        const normalizedCurrentLines = normalizeCityLines(currentLines);
        const normalizedOldLines = normalizeCityLines(oldLines);

        container.innerHTML = '';

        const currentMap = buildStatusMap(normalizedCurrentLines);
        const previousMap = buildStatusMap(normalizedOldLines);
        const changes = compareWithPrevious(previousMap, currentMap);

        normalizedCurrentLines.forEach((line) => {
          const parts = line.split('|');
          const city = (parts[0] || '').trim();
          const normalizedStatus = (parts[1] || 'open').trim().toLowerCase();
          const status = normalizedStatus === 'closed' ? 'closed' : 'open';

          if (!city) {
            return;
          }

          container.appendChild(createCard(city, status, changes[city] || ''));
        });

        if (!container.children.length) {
          container.innerHTML = '<div class="message">Nenhuma cidade encontrada no arquivo.</div>';
        }

        applyFilter();
      } catch (error) {
        console.error(error);
        container.innerHTML = '<div class="message">Erro ao carregar os arquivos. Verifique a URL do cidades.txt e do cidades_old.txt.</div>';
      } finally {
        const loader = document.getElementById('loader');
        setTimeout(() => {
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => {
              loader.remove();
            }, 500);
          }
        }, 2000);
      }
    }

    function runBasicChecks() {
      console.assert(typeof createCard === 'function', 'createCard deve existir');
      console.assert(typeof applyFilter === 'function', 'applyFilter deve existir');
      console.assert(typeof parseLinesFromText === 'function', 'parseLinesFromText deve existir');
      console.assert(typeof buildStatusMap === 'function', 'buildStatusMap deve existir');
      console.assert(typeof compareWithPrevious === 'function', 'compareWithPrevious deve existir');
      console.assert(typeof normalizeCityLines === 'function', 'normalizeCityLines deve existir');
      console.assert(typeof loadCities === 'function', 'loadCities deve existir');

      const testCard = createCard('Cidade Teste', 'open', 'opened');
      console.assert(testCard.classList.contains('card'), 'O card deve ter a classe card');
      console.assert(testCard.dataset.status === 'open', 'O status do card deve ser open');
      console.assert(testCard.dataset.city === 'cidade teste', 'O dataset city deve ser normalizado');
      console.assert(testCard.querySelector('h3').textContent === 'Cidade Teste', 'O título da cidade deve ser renderizado');
      console.assert(testCard.querySelector('.status').textContent === 'Disponível', 'O texto de status deve ser renderizado');
      console.assert(testCard.querySelector('.change-badge').textContent === 'Abriu agora', 'O selo de mudança deve ser renderizado');

      const parsedLines = parseLinesFromText('31/03/2026 12:56\nAberdeen|closed\nAbingdon|open\n');
      console.assert(parsedLines.length === 3, 'parseLinesFromText deve manter a linha da data e as cidades');

      const normalizedLines = normalizeCityLines(['31/03/2026 12:56', 'Aberdeen|closed', 'Abingdon|open']);
      console.assert(normalizedLines.length === 2, 'normalizeCityLines deve remover linhas sem separador');

      const testMap = buildStatusMap(['Aberdeen|closed', 'Abingdon|open']);
      console.assert(testMap.Aberdeen === 'closed', 'buildStatusMap deve mapear closed');
      console.assert(testMap.Abingdon === 'open', 'buildStatusMap deve mapear open');

      const changes = compareWithPrevious(
        { Aberdeen: 'closed', Abingdon: 'open' },
        { Aberdeen: 'open', Abingdon: 'closed', Bath: 'open' }
      );
      console.assert(changes.Aberdeen === 'opened', 'Deve detectar quando a área abriu');
      console.assert(changes.Abingdon === 'closed', 'Deve detectar quando a área fechou');
      console.assert(!changes.Bath, 'Não deve marcar cidade nova como alteração');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const onlyAvailable = document.getElementById('onlyAvailable');
      const searchInput = document.getElementById('searchInput');

      onlyAvailable.addEventListener('change', applyFilter);
      searchInput.addEventListener('input', applyFilter);

      runBasicChecks();
      loadCities();
    });
  </script>
</body>
</html>
