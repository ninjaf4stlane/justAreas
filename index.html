<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Áreas Disponíveis</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }

    body { background:#fff7f0; color:#333; }

    /* LOADER */
    #loader {
      position:fixed;
      width:100%;
      height:100vh;
      background:#ff7a00;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      color:white;
      z-index:9999;
    }

    .wheel {
      width:50px;
      height:50px;
      border:6px solid white;
      border-top:6px solid rgba(255,255,255,0.3);
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:10px;
    }

    @keyframes spin {
      0% { transform:rotate(0deg);} 
      100% { transform:rotate(360deg);} 
    }

    header {
      background:linear-gradient(90deg,#ff7a00,#ff9a3c);
      padding:20px;
      text-align:center;
      color:white;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      padding:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.2s;
    }

    .card:hover { transform:translateY(-5px); }

    .card h3 {
      color:#ff7a00;
      margin-bottom:8px;
      font-size:16px;
    }

    .status { font-size:13px; }
    .open { color:green; }
    .closed { color:red; }

  </style>
</head>
<body>

<div id="loader">
  <div class="wheel"></div>
  <p>Carregando...</p>
</div>

<header>
  Áreas Disponíveis para Registro
</header>

<div class="container" id="container">
  <!-- Cards serão carregados aqui dinamicamente -->
</div>

<script>
// Função para carregar cidades de um arquivo de texto no GitHub
async function loadCities() {
  try {
    // Substitua essa URL pelo raw link do seu arquivo de texto no GitHub
    const response = await fetch('https://raw.githubusercontent.com/ninjaf4stlane/justAreas/main/cidades.txt');
    const text = await response.text();
    const lines = text.split('\n').filter(line => line.trim() !== '');

    const container = document.getElementById('container');
    container.innerHTML = ''; // limpa antes de adicionar

    lines.forEach(line => {
      // Cada linha pode ter 'Cidade|status' (ex: São Paulo|open)
      const parts = line.split('|');
      const city = parts[0].trim();
      const status = (parts[1] || 'open').trim();

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<h3>${city}</h3><p class='status ${status}'>${status === 'open' ? 'Disponível' : 'Indisponível'}</p>`;

      container.appendChild(card);
    });
  } catch(err) {
    console.error('Erro ao carregar cidades:', err);
  }
}

window.addEventListener('load', () => {
  const loader = document.getElementById('loader');
  loadCities();

  setTimeout(() => {
    loader.style.opacity = '0';
    loader.style.transition = '0.5s';
    setTimeout(() => loader.remove(), 500);
  }, 2000);
});
</script>

</body>
</html>
