<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Áreas Disponíveis</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }

    body { background:#fff7f0; color:#333; }

    /* LOADER */
    #loader {
      position:fixed;
      width:100%;
      height:100vh;
      background:#ff7a00;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      color:white;
      z-index:9999;
    }

    .wheel {
      width:50px;
      height:50px;
      border:6px solid white;
      border-top:6px solid rgba(255,255,255,0.3);
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:10px;
    }

    @keyframes spin {
      0% { transform:rotate(0deg);} 
      100% { transform:rotate(360deg);} 
    }

    header {
      background:linear-gradient(90deg,#ff7a00,#ff9a3c);
      padding:20px;
      text-align:center;
      color:white;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      padding:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.2s;
    }

    .card:hover { transform:translateY(-5px); }

    .card h3 {
      color:#ff7a00;
      margin-bottom:8px;
      font-size:16px;
    }

    .status { font-size:13px; }
    .open { color:green; }
    .closed { color:red; }

  </style>
</head>
<body>

<div id="loader">
  <div class="wheel"></div>
  <p>Carregando...</p>
</div>

<header>
  Áreas Disponíveis para Registro
  <div style="margin-top:15px; display:flex; justify-content:center;">
    <input id="searchInput" type="text" placeholder="Pesquisar área..." style="padding:10px; border:none; border-radius:10px; width:250px;">
    <label style="margin-left:10px; font-size:14px; color:white;">
      <input type="checkbox" id="hideClosed"> Ocultar indisponíveis
    </label>
  </div>
</header>

<div class="container">
  <div class="card" data-name="$1"><h3>$1</h3><p class="status $2">$3</p></div>
  <div class="card" data-name="$1"><h3>$1</h3><p class="status $2">$3</p></div>
  <div class="card" data-name="$1"><h3>$1</h3><p class="status $2">$3</p></div>
  <div class="card" data-name="$1"><h3>$1</h3><p class="status $2">$3</p></div>
  <div class="card" data-name="$1"><h3>$1</h3><p class="status $2">$3</p></div>
  <div class="card" data-name="$1"><h3>$1</h3><p class="status $2">$3</p></div>
  <div class="card" data-name="$1"><h3>$1</h3><p class="status $2">$3</p></div>
  <div class="card" data-name="$1"><h3>$1</h3><p class="status $2">$3</p></div>
</div>

<script>
window.addEventListener("load",()=>{
  const loader=document.getElementById("loader");

  setTimeout(()=>{
    loader.style.opacity="0";
    loader.style.transition="0.5s";

    setTimeout(()=>{
      loader.remove();
    },500);

  },2000);
});


const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");
const hideClosed = document.getElementById("hideClosed");

function filterCards() {
  const value = searchInput.value.toLowerCase();
  const hide = hideClosed.checked;

  cards.forEach(card => {
    const name = card.dataset.name.toLowerCase();
    const isClosed = card.querySelector(".status").classList.contains("closed");

    let show = true;

    if (!name.includes(value)) show = false;
    if (hide && isClosed) show = false;

    card.style.display = show ? "block" : "none";
  });
}

searchInput.addEventListener("input", filterCards);
hideClosed.addEventListener("change", filterCards);
});

</script>

</body>
</html>
