<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Áreas Disponíveis</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }

    body { background:#fff7f0; color:#333; }

    /* LOADER */
    #loader {
      position:fixed;
      width:100%;
      height:100vh;
      background:#ff7a00;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      color:white;
      z-index:9999;
    }

    .wheel {
      width:50px;
      height:50px;
      border:6px solid white;
      border-top:6px solid rgba(255,255,255,0.3);
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:10px;
    }

    @keyframes spin {
      0% { transform:rotate(0deg);} 
      100% { transform:rotate(360deg);} 
    }

    header {
      background:linear-gradient(90deg,#ff7a00,#ff9a3c);
      padding:20px;
      text-align:center;
      color:white;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      padding:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.2s;
    }

    .card:hover { transform:translateY(-5px); }

    .card h3 {
      color:#ff7a00;
      margin-bottom:8px;
      font-size:16px;
    }

    .status { font-size:13px; }
    .open { color:green; }
    .closed { color:red; }

    .empty-message {
      grid-column: 1 / -1;
      text-align:center;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      color:#777;
    }

  </style>
</head>
<body>

<div id="loader">
  <div class="wheel"></div>
  <p>Carregando...</p>
</div>

<header>
  Áreas Disponíveis para Registro
  <div style="margin-top:15px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
    <input id="searchInput" type="text" placeholder="Pesquisar área..." style="padding:10px 12px; border:none; border-radius:10px; width:260px; outline:none;">
    <label style="display:flex; align-items:center; gap:6px; font-size:14px; background:rgba(255,255,255,0.18); padding:10px 12px; border-radius:10px;">
      <input type="checkbox" id="availableOnly">
      Mostrar apenas disponíveis
    </label>
  </div>
</header>

<div class="container" id="container">
  <!-- Cards serão carregados aqui dinamicamente -->
</div>

<script>
let allCities = [];

function renderCities() {
  const container = document.getElementById('container');
  const searchInput = document.getElementById('searchInput');
  const availableOnly = document.getElementById('availableOnly');

  const search = searchInput.value.trim().toLowerCase();
  const onlyAvailable = availableOnly.checked;

  const filtered = allCities.filter(item => {
    const matchName = item.city.toLowerCase().includes(search);
    const matchStatus = !onlyAvailable || item.status === 'open';
    return matchName && matchStatus;
  });

  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-message">Nenhuma área encontrada.</div>';
    return;
  }

  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${item.city}</h3><p class="status ${item.status}">${item.status === 'open' ? 'Disponível' : 'Indisponível'}</p>`;
    container.appendChild(card);
  });
}

async function loadCities() {
  const container = document.getElementById('container');

  try {
    const response = await fetch('https://raw.githubusercontent.com/ninjaf4stlane/justAreas/main/cidades.txt?ts=' + Date.now());

    if (!response.ok) {
      throw new Error('Arquivo cidades.txt não encontrado');
    }

    const text = await response.text();
    const lines = text.split('
').filter(line => line.trim() !== '');

    allCities = lines.map(line => {
      const parts = line.split('|');
      return {
        city: (parts[0] || '').trim(),
        status: ((parts[1] || 'open').trim().toLowerCase() === 'closed') ? 'closed' : 'open'
      };
    }).filter(item => item.city);

    renderCities();
  } catch (err) {
    console.error('Erro ao carregar cidades:', err);
    container.innerHTML = '<div class="empty-message">Erro ao carregar as áreas. Verifique se o arquivo <b>cidades.txt</b> está na mesma pasta do HTML.</div>';
  }
}

window.addEventListener('load', () => {
  const loader = document.getElementById('loader');
  const searchInput = document.getElementById('searchInput');
  const availableOnly = document.getElementById('availableOnly');

  searchInput.addEventListener('input', renderCities);
  availableOnly.addEventListener('change', renderCities);

  loadCities().finally(() => {
    setTimeout(() => {
      loader.style.opacity = '0';
      loader.style.transition = '0.5s';
      setTimeout(() => loader.remove(), 500);
    }, 2000);
  });
});
</script>

</body>
</html>
