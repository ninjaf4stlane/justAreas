<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Áreas Disponíveis</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }

    body { background:#fff7f0; color:#333; }

    /* LOADER */
    #loader {
      position:fixed;
      width:100%;
      height:100vh;
      background:#ff7a00;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      color:white;
      z-index:9999;
    }

    .wheel {
      width:50px;
      height:50px;
      border:6px solid white;
      border-top:6px solid rgba(255,255,255,0.3);
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:10px;
    }

    @keyframes spin {
      0% { transform:rotate(0deg);} 
      100% { transform:rotate(360deg);} 
    }

    header {
      background:linear-gradient(90deg,#ff7a00,#ff9a3c);
      padding:20px;
      text-align:center;
      color:white;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      padding:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.2s;
    }

    .card:hover { transform:translateY(-5px); }

    .card h3 {
      color:#ff7a00;
      margin-bottom:8px;
      font-size:16px;
    }

    .status { font-size:13px; }
    .open { color:green; }
    .closed { color:red; }

  </style>
</head>
<body>

<div id="loader">
  <div class="wheel"></div>
  <p>Carregando...</p>
</div>

<header>
  Áreas Disponíveis para Registro
</header>

<div class="container">
  <div class="card"><h3>São Paulo</h3><p class="status open">Disponível</p></div>
  <div class="card"><h3>Rio de Janeiro</h3><p class="status closed">Indisponível</p></div>
  <div class="card"><h3>Belo Horizonte</h3><p class="status open">Disponível</p></div>
  <div class="card"><h3>Curitiba</h3><p class="status open">Disponível</p></div>
  <div class="card"><h3>Porto Alegre</h3><p class="status closed">Indisponível</p></div>
  <div class="card"><h3>Salvador</h3><p class="status open">Disponível</p></div>
  <div class="card"><h3>Fortaleza</h3><p class="status open">Disponível</p></div>
  <div class="card"><h3>Recife</h3><p class="status closed">Indisponível</p></div>
</div>

<script>
window.addEventListener("load",()=>{
  const loader=document.getElementById("loader");

  setTimeout(()=>{
    loader.style.opacity="0";
    loader.style.transition="0.5s";

    setTimeout(()=>{
      loader.remove();
    },500);

  },2000);
});
</script>

</body>
</html>
