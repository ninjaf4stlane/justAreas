<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Áreas Disponíveis</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #fff7f0;
      color: #333;
    }

    #loader {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      background: #ff7a00;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .wheel {
      width: 50px;
      height: 50px;
      border: 6px solid white;
      border-top: 6px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    header {
      background: linear-gradient(90deg, #ff7a00, #ff9a3c);
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    .header-controls {
      margin-top: 12px;
      font-size: 14px;
      font-weight: normal;
    }

    .header-controls label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      color: #ff7a00;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .status {
      font-size: 13px;
    }

    .open {
      color: green;
    }

    .closed {
      color: red;
    }

    .message {
      padding: 30px;
      text-align: center;
      color: #777;
      font-size: 15px;
    }
  
    /* Checkbox font improvement */
    .header-controls label {
      font-family: 'Poppins', Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loader">
    <div class="wheel"></div>
    <p>Carregando...</p>
  </div>

  <header>
    Áreas Disponíveis para Registro
    <div class="header-controls">
      <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <input
          type="text"
          id="searchInput"
          placeholder="Pesquisar área..."
          style="width:280px; max-width:90%; padding:10px 14px; border:none; outline:none; border-radius:10px; font-family:'Poppins', Arial, sans-serif; font-size:14px; color:#333;"
        >
        <label>
          <input type="checkbox" id="onlyAvailable" checked>
          Mostrar apenas áreas disponíveis
        </label>
      </div>
    </div>
  </header>

  <div class="container" id="container"></div>

  <script>
    const FILE_URL = 'https://raw.githubusercontent.com/ninjaf4stlane/justAreas/main/cidades.txt';

    function createCard(city, status) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.status = status;

      const title = document.createElement('h3');
      title.textContent = city;

      const statusEl = document.createElement('p');
      statusEl.className = `status ${status}`;
      statusEl.textContent = status === 'open' ? 'Disponível' : 'Indisponível';

      card.appendChild(title);
      card.appendChild(statusEl);
      return card;
    }

    function applyFilter() {
      const checkbox = document.getElementById('onlyAvailable');
      const searchInput = document.getElementById('searchInput');
      const cards = document.querySelectorAll('.card');
      const showOnlyAvailable = checkbox.checked;
      const search = searchInput.value.trim().toLowerCase();

      cards.forEach((card) => {
        const isAvailable = card.dataset.status === 'open';
        const cityName = card.querySelector('h3')?.textContent.toLowerCase() || '';

        const matchesAvailability = !showOnlyAvailable || isAvailable;
        const matchesSearch = cityName.includes(search);

        card.style.display = matchesAvailability && matchesSearch ? 'block' : 'none';
      });
    });
    }

    async function loadCities() {
      const container = document.getElementById('container');

      try {
        const response = await fetch(FILE_URL, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('Não foi possível carregar o arquivo de cidades.');
        }

        const text = await response.text();
        const lines = text
          .split('\n')
          .map(line => line.trim())
          .filter(line => line.length > 0);

        container.innerHTML = '';

        lines.forEach((line) => {
          const [cityRaw, statusRaw] = line.split('|');
          const city = (cityRaw || '').trim();
          const status = ((statusRaw || 'open').trim().toLowerCase() === 'closed') ? 'closed' : 'open';

          if (!city) return;
          container.appendChild(createCard(city, status));
        });

        if (!container.children.length) {
          container.innerHTML = '<div class="message">Nenhuma cidade encontrada no arquivo.</div>';
        }

        applyFilter();
      } catch (error) {
        console.error(error);
        container.innerHTML = '<div class="message">Erro ao carregar as cidades. Verifique a URL do arquivo .txt.</div>';
      } finally {
        const loader = document.getElementById('loader');
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.remove();
          }, 500);
        }, 2000);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('onlyAvailable').addEventListener('change', applyFilter);
      document.getElementById('searchInput').addEventListener('input', applyFilter);
      loadCities();
    });
  </script>
</body>
</html>
