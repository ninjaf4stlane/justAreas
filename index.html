<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustAreas - Áreas do Reino Unido</title>

  <!-- Estilos -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #lista {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .area {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    .open { color: green; font-weight: bold; }
    .closed { color: #888; }

    #map {
      width: 100%;
      height: 500px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-top: 20px;
      display: none; /* inicialmente oculto */
    }

    #btnMapa {
      display: block;
      margin: 20px auto;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    #btnMapa:hover { background-color: #004d99; }
  </style>

  <!-- Leaflet -->
  <link rel="stylesheet" href="[unpkg.com](https://unpkg.com/leaflet/dist/leaflet.css)" />
  <script src="[unpkg.com](https://unpkg.com/leaflet/dist/leaflet.js)"></script>
</head>

<body>
  <h1>Áreas Disponíveis no Reino Unido</h1>

  <div id="lista">Carregando áreas...</div>

  <button id="btnMapa">🗺️ Ver no Mapa</button>
  <div id="map"></div>

  <script>
  // Função que carrega a lista das áreas
  async function loadAreas() {
    const FILE_URL = `https://raw.githubusercontent.com/ninjaf4stlane/justAreas/refs/heads/main/cidades.txt?t=${Date.now()}`;
    const resp = await fetch(url);
    const text = await resp.text();

    return text
      .split("\n")
      .filter(l => l.trim().length > 0)
      .map(line => {
        const [pais, nome, status] = line.split("|");
        return { pais, nome, status };
      });
  }

  // Mostra a lista de áreas
  async function showList() {
    const listaDiv = document.getElementById("lista");
    const areas = await loadAreas();

    listaDiv.innerHTML = "";
    areas.forEach(area => {
      const div = document.createElement("div");
      div.className = "area " + area.status;
      div.textContent = `${area.nome} - ${area.status.toUpperCase()}`;
      listaDiv.appendChild(div);
    });

    return areas;
  }

  // Geocodifica cidade -> coordenadas via Nominatim
  async function geocode(city) {
    try {
      const url = `[nominatim.openstreetmap.org](https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city) + ", UK")}`;
      const resp = await fetch(url, { headers: { "User-Agent": "justareas-map" }});
      const data = await resp.json();
      if (data.length === 0) return null;
      return { lat: data[0].lat, lon: data[0].lon };
    } catch (e) {
      console.error("Erro ao geocodificar:", city, e);
      return null;
    }
  }

  // Cria o mapa e plota os pontos
  async function showMap() {
    const mapDiv = document.getElementById("map");
    mapDiv.style.display = "block";

    const areas = await loadAreas();

    const map = L.map("map").setView([54.5, -3.0], 6);
    L.tileLayer("[{s}.tile.openstreetmap.org](https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png)", {
      attribution: "© OpenStreetMap",
    }).addTo(map);

    for (const area of areas) {
      const coords = await geocode(area.nome);
      if (!coords) continue;

      const color = area.status === "open" ? "green" : "gray";
      L.circleMarker([coords.lat, coords.lon], {
        radius: 8,
        color: color,
        fillColor: color,
        fillOpacity: 0.6,
      })
        .addTo(map)
        .bindPopup(`<b>${area.nome}</b><br>Status: ${area.status}`);
    }

    const btn = document.getElementById("btnMapa");
    btn.disabled = true;
    btn.textContent = "Mapa carregado ✅";
  }

  // Inicializa a página
  showList();

  // Evento do botão
  document.getElementById("btnMapa").addEventListener("click", showMap);
  </script>
</body>
</html>
