<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Áreas Disponíveis</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #fff7f0;
      color: #333;
    }

    /* LOADING SCREEN */
    #loader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #ff7a00;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      flex-direction: column;
      color: white;
    }

    .wheel {
      width: 50px;
      height: 50px;
      border: 6px solid white;
      border-top: 6px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
      100% { transform: translateX(200px); }
    }

    /* HEADER */
    header {
      background: linear-gradient(90deg, #ff7a00, #ff9a3c);
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    /* CONTAINER */
    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 600px;
      margin: auto;
    }

    /* CARD */
    .card {
      background: white;
      border-radius: 8px;
      padding: 10px 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
      color: #ff7a00;
      font-weight: 600;
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
    }

    .open { color: green; }
    .closed { color: red; }

    

    button:hover {
      background: #e56700;
    }

  </style>
</head>
<body>

<div id="loader">
  <div class="wheel"></div>
  <p>Carregando...</p>
</div>
  <p>Carregando...</p>
</div>

<header>
  Áreas Disponíveis para Registro
  <div style="margin-top:15px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
    <input id="searchInput" type="text" placeholder="Pesquisar área..." style="padding:8px; border-radius:8px; border:none; width:220px;">
    <label style="display:flex; align-items:center; gap:5px; font-size:13px;">
      <input type="checkbox" id="toggleClosed"> Ocultar indisponíveis
    </label>
  </div>
</header>

<div class="container">

  <div class="card" data-name="$1">
    <h3>$1</h3>
    <span class="status $2">$2</span>
  </div>

  <div class="card" data-name="$1">
    <h3>$1</h3>
    <span class="status $2">$2</span>
  </div>

  <div class="card" data-name="$1">
    <h3>$1</h3>
    <span class="status $2">$2</span>
  </div>

  <div class="card" data-name="$1">
    <h3>$1</h3>
    <span class="status $2">$2</span>
  </div>

</div>

<script>
  window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    setTimeout(() => {
      loader.style.opacity = "0";
      loader.style.transition = "opacity 0.5s ease";
      setTimeout(() => loader.style.display = "none", 500);
    }, 2000);
  });

  const searchInput = document.getElementById("searchInput");
  const toggleClosed = document.getElementById("toggleClosed");
  const cards = document.querySelectorAll(".card");

  function filterCards() {
    const search = searchInput.value.toLowerCase();
    const hideClosed = toggleClosed.checked;

    cards.forEach(card => {
      const name = card.dataset.name.toLowerCase();
      const isClosed = card.querySelector(".status").classList.contains("closed");

      let show = true;

      if (!name.includes(search)) show = false;
      if (hideClosed && isClosed) show = false;

      card.style.display = show ? "block" : "none";
    });
  }

  searchInput.addEventListener("input", filterCards);
  toggleClosed.addEventListener("change", filterCards);
</script>

</body>
</html>
